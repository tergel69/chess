<!DOCTYPE html>
<html>
<head>
    <title>FEN Test</title>
</head>
<body>
    <h1>FEN Parsing Test</h1>
    <div id="output"></div>
    
    <script>
        // Simple FEN parser test
        function parseFEN(fen) {
            const parts = fen.split(' ');
            const position = parts[0];
            const activeColor = parts[1];
            const castling = parts[2];
            const enPassant = parts[3];
            const halfMoveClock = parseInt(parts[4] || '0', 10);
            const fullMoveNumber = parseInt(parts[5] || '1', 10);

            // Parse board
            const board = Array(8).fill(null).map(() => Array(8).fill(null));
            const rows = position.split('/');
            
            for (let row = 0; row < 8; row++) {
                let col = 0;
                for (const char of rows[row]) {
                    if (char >= '1' && char <= '8') {
                        col += parseInt(char, 10);
                    } else {
                        const color = char === char.toUpperCase() ? 'white' : 'black';
                        const type = char.toLowerCase();
                        board[row][col] = { type, color };
                        col++;
                    }
                }
            }

            return {
                board,
                turn: activeColor,
                castlingRights: castling,
                enPassantTarget: enPassant,
                halfMoveClock,
                fullMoveNumber,
            };
        }

        const testFEN = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
        const result = parseFEN(testFEN);
        
        const output = document.getElementById('output');
        output.innerHTML = `
            <p>Test FEN: ${testFEN}</p>
            <p>Active Color: ${result.turn}</p>
            <p>Castling: ${result.castlingRights}</p>
            <p>Board has ${result.board.flat().filter(p => p).length} pieces</p>
            <p>First row: ${JSON.stringify(result.board[0])}</p>
            <p>Second row: ${JSON.stringify(result.board[1])}</p>
        `;
        
        console.log('FEN parsing test result:', result);
    </script>
</body>
</html>
